<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Azcon · Caspian Corridor Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;500;700;900&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
/* ===================== DESIGN TOKENS ===================== */
:root {
  --bg:        #07090f;
  --surface:   #0d1117;
  --card:      #111827;
  --border:    #1e2d40;
  --accent:    #00d4ff;
  --accent2:   #00ff9d;
  --warn:      #ffaa00;
  --danger:    #ff4060;
  --muted:     #4a6076;
  --text:      #c8d8e8;
  --text-dim:  #6b8499;
  --font-mono: 'Share Tech Mono', monospace;
  --font-ui:   'Barlow Condensed', sans-serif;
  --font-body: 'Barlow', sans-serif;
  --radius:    6px;
  --glow:      0 0 18px rgba(0,212,255,.25);
  --glow2:     0 0 14px rgba(0,255,157,.2);
}

/* ===================== RESET ===================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 13px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===================== TOP BAR ===================== */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 999;
}
.logo {
  font-family: var(--font-ui);
  font-weight: 900;
  font-size: 22px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
  text-shadow: var(--glow);
}
.logo span { color: var(--accent2); }
.header-meta {
  display: flex; gap: 24px; align-items: center;
  font-family: var(--font-mono); font-size: 11px; color: var(--text-dim);
}
.live-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent2);
  box-shadow: 0 0 8px var(--accent2);
  animation: pulse 1.5s infinite;
  display: inline-block; margin-right: 6px;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ===================== LAYOUT ===================== */
.app {
  display: grid;
  grid-template-columns: 280px 1fr 340px;
  grid-template-rows: auto 1fr;
  height: calc(100vh - 52px);
}
.sidebar-left  { grid-row: 1 / 3; border-right: 1px solid var(--border); overflow-y: auto; }
.main-center   { grid-row: 1 / 3; display: flex; flex-direction: column; }
.sidebar-right { grid-row: 1 / 3; border-left:  1px solid var(--border); overflow-y: auto; }

/* ===================== PANEL NAV (tabs) ===================== */
.panel-tabs {
  display: flex; gap: 2px;
  padding: 8px 8px 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.tab-btn {
  flex: 1;
  background: transparent;
  border: 1px solid transparent;
  border-bottom: none;
  color: var(--text-dim);
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  padding: 7px 4px 6px;
  border-radius: var(--radius) var(--radius) 0 0;
  transition: all .2s;
}
.tab-btn:hover { color: var(--text); background: var(--card); }
.tab-btn.active {
  color: var(--accent);
  background: var(--card);
  border-color: var(--border);
  text-shadow: var(--glow);
}

/* ===================== PANEL CONTENT ===================== */
.panel { display: none; padding: 12px; flex-direction: column; gap: 10px; }
.panel.active { display: flex; }

/* ===================== SECTION HEADERS ===================== */
.section-hdr {
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent);
  padding: 6px 0 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
}

/* ===================== VESSELS LIST ===================== */
.vessel-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
  cursor: pointer;
  transition: border-color .2s, box-shadow .2s;
  position: relative;
}
.vessel-card:hover { border-color: var(--accent); box-shadow: var(--glow); }
.vessel-card.selected { border-color: var(--accent2); box-shadow: var(--glow2); }
.vc-name { font-family: var(--font-ui); font-size: 15px; font-weight: 700; color: #fff; }
.vc-mmsi { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); }
.vc-row { display: flex; justify-content: space-between; margin-top: 6px; }
.vc-stat { text-align: center; }
.vc-stat .val { font-family: var(--font-mono); font-size: 12px; color: var(--accent); }
.vc-stat .lbl { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
.badge {
  display: inline-block;
  padding: 1px 7px;
  border-radius: 10px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  position: absolute; top: 8px; right: 8px;
}
.badge-active  { background: rgba(0,255,157,.15); color: var(--accent2); border: 1px solid rgba(0,255,157,.3); }
.badge-anchor  { background: rgba(255,170,0,.15);  color: var(--warn);    border: 1px solid rgba(255,170,0,.3); }
.badge-dark    { background: rgba(255,64,96,.15);  color: var(--danger);  border: 1px solid rgba(255,64,96,.3); }

/* ===================== MAP ===================== */
#map { flex: 1; }
#map .leaflet-container { background: #040810 !important; }

/* ===================== KPI ROW ===================== */
.kpi-row {
  display: flex; gap: 8px;
  padding: 10px 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.kpi {
  flex: 1; text-align: center;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 4px;
}
.kpi .k-val { font-family: var(--font-mono); font-size: 20px; color: var(--accent); }
.kpi .k-lbl { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

/* ===================== INFO CARDS (right panel) ===================== */
.info-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
}
.info-card h4 {
  font-family: var(--font-ui); font-size: 13px; font-weight: 700;
  letter-spacing: 1px; color: #fff; margin-bottom: 8px;
}
.row-kv { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,.04); }
.row-kv:last-child { border-bottom: none; }
.row-kv .k { color: var(--text-dim); font-size: 11px; }
.row-kv .v { font-family: var(--font-mono); font-size: 11px; color: var(--text); }
.v.accent { color: var(--accent); }
.v.green  { color: var(--accent2); }
.v.warn   { color: var(--warn); }
.v.danger { color: var(--danger); }

/* ===================== ANOMALY ITEMS ===================== */
.anom-item {
  display: flex; gap: 10px; align-items: flex-start;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px;
  border-left: 3px solid var(--muted);
}
.anom-item.HIGH   { border-left-color: var(--danger); }
.anom-item.MEDIUM { border-left-color: var(--warn); }
.anom-item.LOW    { border-left-color: var(--accent); }
.anom-icon { font-size: 20px; line-height: 1; }
.anom-body { flex: 1; }
.anom-body strong { font-family: var(--font-ui); font-size: 13px; color: #fff; }
.anom-body p { font-size: 11px; color: var(--text-dim); margin-top: 2px; line-height: 1.4; }
.anom-body .action { font-size: 10px; color: var(--warn); margin-top: 4px; }
.anom-badge {
  font-family: var(--font-mono); font-size: 9px; font-weight: 700;
  padding: 2px 6px; border-radius: 10px; white-space: nowrap;
}
.anom-badge.HIGH   { background: rgba(255,64,96,.2);  color: var(--danger); }
.anom-badge.MEDIUM { background: rgba(255,170,0,.2);  color: var(--warn); }
.anom-badge.LOW    { background: rgba(0,212,255,.15); color: var(--accent); }
.anom-badge.NONE   { background: rgba(0,255,157,.15); color: var(--accent2); }

/* ===================== SCHEDULE TABLE ===================== */
.sched-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.sched-table th {
  font-family: var(--font-ui); font-size: 10px; letter-spacing: 1px;
  text-transform: uppercase; color: var(--text-dim);
  text-align: left; padding: 6px 8px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.sched-table td { padding: 7px 8px; border-bottom: 1px solid rgba(255,255,255,.04); }
.sched-table tr:hover td { background: rgba(0,212,255,.04); }
.priority-HIGH   { color: var(--danger); font-weight: 700; }
.priority-MEDIUM { color: var(--warn); }
.priority-NORMAL { color: var(--accent2); }

/* ===================== SAT PANEL ===================== */
.sat-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.sat-stat {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px; text-align: center;
}
.sat-stat .big { font-family: var(--font-mono); font-size: 24px; color: var(--accent); }
.sat-stat .sub { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
.sat-orbit {
  background: radial-gradient(ellipse at 50% 60%, rgba(0,212,255,.06) 0%, transparent 70%);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px; text-align: center; position: relative;
}
.sat-orbit canvas { width: 100%; max-width: 240px; }
.signal-bar {
  height: 6px; border-radius: 3px; margin-top: 4px;
  background: linear-gradient(90deg, var(--danger) 0%, var(--warn) 40%, var(--accent2) 75%, var(--accent) 100%);
}

/* ===================== ETA PROGRESS BARS ===================== */
.eta-item {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 12px;
}
.eta-item-top { display: flex; justify-content: space-between; align-items: baseline; }
.eta-name { font-family: var(--font-ui); font-size: 14px; font-weight: 700; color: #fff; }
.eta-time { font-family: var(--font-mono); font-size: 12px; color: var(--accent); }
.eta-bar-wrap { margin-top: 6px; background: var(--surface); border-radius: 3px; height: 5px; }
.eta-bar-fill { height: 100%; border-radius: 3px; transition: width 1s; }
.eta-meta { display: flex; justify-content: space-between; margin-top: 4px; font-size: 10px; color: var(--text-dim); }

/* ===================== WEATHER BANNER ===================== */
.weather-banner {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 12px;
  border-radius: var(--radius);
  background: var(--surface);
  border: 1px solid var(--border);
}
.weather-banner.stormy { border-color: var(--danger); background: rgba(255,64,96,.08); }
.weather-banner.warn   { border-color: var(--warn);   background: rgba(255,170,0,.08); }
.weather-banner .wicon { font-size: 24px; }
.weather-banner .wtext strong { font-family: var(--font-ui); font-size: 14px; color: #fff; display: block; }
.weather-banner .wtext small  { font-size: 10px; color: var(--text-dim); }

/* ===================== BUTTONS ===================== */
.btn {
  font-family: var(--font-ui); font-size: 12px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  padding: 8px 16px; border-radius: var(--radius);
  border: 1px solid var(--accent); background: transparent;
  color: var(--accent); cursor: pointer; transition: all .2s;
}
.btn:hover { background: var(--accent); color: var(--bg); box-shadow: var(--glow); }
.btn-green { border-color: var(--accent2); color: var(--accent2); }
.btn-green:hover { background: var(--accent2); color: var(--bg); box-shadow: var(--glow2); }
.btn-sm { padding: 4px 10px; font-size: 10px; }

/* ===================== SCROLLBAR ===================== */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ===================== LOADING SPINNER ===================== */
.spinner {
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  width: 20px; height: 20px;
  animation: spin .8s linear infinite;
  margin: 0 auto;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-row { display: flex; align-items: center; gap: 8px; color: var(--text-dim); font-size: 11px; padding: 8px; }

/* ===================== CLOCK ===================== */
#clock { font-family: var(--font-mono); font-size: 12px; color: var(--accent2); }
</style>
</head>
<body>

<!-- ═══════════════════════════════ HEADER ═══════════════════════════════ -->
<header>
  <div class="logo">AZ<span>CON</span> · Caspian Corridor</div>
  <div class="header-meta">
    <span><span class="live-dot"></span>CANLI</span>
    <span id="clock">--:--:--</span>
    <span id="ws-status" style="color:var(--warn)">WS QOŞULUR...</span>
  </div>
</header>

<!-- ═══════════════════════════════ APP GRID ═══════════════════════════════ -->
<div class="app">

  <!-- ──────── LEFT SIDEBAR: Vessel List ──────── -->
  <aside class="sidebar-left">
    <div class="section-hdr" style="margin:12px 12px 8px">
      GƏMİ FLOTİLLASI
    </div>
    <div id="vessel-list" style="padding:0 8px 12px;display:flex;flex-direction:column;gap:6px">
      <div class="loading-row"><div class="spinner"></div> Yüklənir...</div>
    </div>
  </aside>

  <!-- ──────── CENTER: Map + KPIs ──────── -->
  <main class="main-center">
    <!-- KPI Row -->
    <div class="kpi-row" id="kpi-row">
      <div class="kpi"><div class="k-val" id="kpi-vessels">—</div><div class="k-lbl">Aktiv Gəmi</div></div>
      <div class="kpi"><div class="k-val" id="kpi-cargo">—</div><div class="k-lbl">Yük (ton)</div></div>
      <div class="kpi"><div class="k-val" id="kpi-wagons">—</div><div class="k-lbl">Vaqon</div></div>
      <div class="kpi"><div class="k-val" id="kpi-alerts">—</div><div class="k-lbl">Anomaliya</div></div>
    </div>
    <!-- Map -->
    <div id="map"></div>
  </main>

  <!-- ──────── RIGHT SIDEBAR: Panels ──────── -->
  <aside class="sidebar-right">
    <!-- TABS -->
    <div class="panel-tabs">
      <button class="tab-btn active" onclick="showTab('vessel')">Gəmi</button>
      <button class="tab-btn" onclick="showTab('reschedule')">Plan</button>
      <button class="tab-btn" onclick="showTab('anomaly')">Anomaliya</button>
      <button class="tab-btn" onclick="showTab('eta')">ETA</button>
      <button class="tab-btn" onclick="showTab('satellite')">Peyk</button>
    </div>

    <!-- PANEL: Vessel Info -->
    <div id="panel-vessel" class="panel active" style="padding:12px">
      <div id="vessel-detail">
        <div style="text-align:center;color:var(--text-dim);padding:40px 0;font-size:12px">
          Məlumat üçün sol siyahıdan gəmi seçin
        </div>
      </div>
    </div>

    <!-- PANEL: Dynamic Rescheduling -->
    <div id="panel-reschedule" class="panel" style="padding:12px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="section-hdr" style="margin:0">DİNAMİK YENİDƏN PLANLAŞDIRMA</div>
        <button class="btn btn-sm" onclick="loadReschedule()">Yenilə</button>
      </div>
      <div id="weather-banner"></div>
      <div id="reschedule-summary"></div>
      <div id="reschedule-table" style="overflow-x:auto"></div>
    </div>

    <!-- PANEL: Anomaly Detection -->
    <div id="panel-anomaly" class="panel" style="padding:12px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="section-hdr" style="margin:0">ANOMALİYA AŞKARLAMA</div>
        <button class="btn btn-sm" onclick="loadAnomalies()">Yenilə</button>
      </div>
      <div id="anomaly-summary"></div>
      <div id="anomaly-list" style="display:flex;flex-direction:column;gap:6px"></div>
    </div>

    <!-- PANEL: ETA Forecast -->
    <div id="panel-eta" class="panel" style="padding:12px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="section-hdr" style="margin:0">ETA PROQNOZU</div>
        <button class="btn btn-sm" onclick="loadETA()">Yenilə</button>
      </div>
      <div id="eta-weather"></div>
      <div id="eta-list" style="display:flex;flex-direction:column;gap:6px"></div>
    </div>

    <!-- PANEL: Azersky Satellite -->
    <div id="panel-satellite" class="panel" style="padding:12px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="section-hdr" style="margin:0">AZERSKY PEYK SİSTEMİ</div>
        <button class="btn btn-sm btn-green" onclick="loadSatellite()">Yenilə</button>
      </div>
      <div id="sat-content"></div>
    </div>

  </aside>
</div><!-- /.app -->

<!-- ═══════════════════════════════ SCRIPTS ═══════════════════════════════ -->
<script>
/* ── Config ── */
const API = '';   // same origin; change to http://... for external
const WS_URL = `${location.protocol==='https:'?'wss':'ws'}://${location.host}/ws/vessels`;

/* ── State ── */
let vessels = {};
let markers = {};
let selectedMMSI = null;
let map, vesselLayer;

/* ── Clock ── */
setInterval(() => {
  document.getElementById('clock').textContent =
    new Date().toUTCString().slice(17,25) + ' UTC';
}, 1000);

/* ══════════════════ MAP INIT ══════════════════ */
function initMap() {
  map = L.map('map', { center: [41.5, 51.0], zoom: 6, zoomControl: false });
  L.control.zoom({ position: 'topright' }).addTo(map);

  // Dark CartoDB basemap
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© CartoDB', maxZoom: 18
  }).addTo(map);

  // Bakı limanı marker
  L.circleMarker([40.342, 49.865], {
    radius: 10, color: '#00d4ff', fillColor: '#00d4ff',
    fillOpacity: 0.25, weight: 2
  }).addTo(map).bindTooltip('🏭 Bakı Limanı', { permanent: false });

  vesselLayer = L.layerGroup().addTo(map);
}

/* ── Vessel icons ── */
function vesselIcon(v) {
  const col = v.status === 'active' ? '#00ff9d' :
              v.status === 'dark'   ? '#ff4060' : '#ffaa00';
  const glow = v.status === 'active' ? '#00ff9d' :
               v.status === 'dark'   ? '#ff4060' : '#ffaa00';
  const rot  = (v.course_deg || 0);
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="30"
      viewBox="0 0 24 30" style="transform:rotate(${rot}deg);transform-origin:12px 15px;
      filter:drop-shadow(0 0 4px{glow})">
    <polygon points="12,2 22,26 12,20 2,26"
      fill="${col}" fill-opacity=".92" stroke="#0a0f18" stroke-width="1.2"/>
  </svg>`;
  return L.divIcon({
    html: svg, className: '',
    iconSize: [24, 30], iconAnchor: [12, 15]
  });
}

/* ══════════════════ VESSEL LIST ══════════════════ */
function renderVesselList() {
  const el = document.getElementById('vessel-list');
  const list = Object.values(vessels);
  if (!list.length) { el.innerHTML = '<div style="color:var(--text-dim);padding:8px">Gəmi yoxdur</div>'; return; }

  el.innerHTML = list.map(v => `
    <div class="vessel-card ${v.mmsi===selectedMMSI?'selected':''}" onclick="selectVessel('${v.mmsi}')">
      <span class="badge badge-${v.status}">${v.status}</span>
      <div class="vc-name">${v.name||v.mmsi}</div>
      <div class="vc-mmsi">MMSI: ${v.mmsi} · ${v.flag||'—'}</div>
      <div class="vc-row">
        <div class="vc-stat"><div class="val">${(v.speed_knots||0).toFixed(1)}</div><div class="lbl">Knot</div></div>
        <div class="vc-stat"><div class="val">${(v.cargo_tons||0).toFixed(0)}</div><div class="lbl">Ton</div></div>
        <div class="vc-stat"><div class="val">${v.destination||'—'}</div><div class="lbl">Hədəf</div></div>
      </div>
    </div>`).join('');
}

/* ══════════════════ VESSEL SELECTION ══════════════════ */
function selectVessel(mmsi) {
  selectedMMSI = mmsi;
  showTab('vessel');
  renderVesselList();
  const v = vessels[mmsi];
  if (!v) return;
  if (markers[mmsi]) map.flyTo([v.lat, v.lon], 9);

  const eta = v.eta ? new Date(v.eta).toLocaleString('az', {hour:'2-digit',minute:'2-digit',day:'2-digit',month:'short'}) : '—';
  const conf = v.eta_confidence ? `${Math.round(v.eta_confidence*100)}%` : '—';

  document.getElementById('vessel-detail').innerHTML = `
    <div class="info-card">
      <h4>${v.name||v.mmsi}</h4>
      <div class="row-kv"><span class="k">MMSI</span><span class="v accent">${v.mmsi}</span></div>
      <div class="row-kv"><span class="k">Növ</span><span class="v">${v.vessel_type||'—'}</span></div>
      <div class="row-kv"><span class="k">Bayraq</span><span class="v">${v.flag||'—'}</span></div>

/* ══════════════════ MAP MARKERS ══════════════════ */
/* ── Trail (iz xətti) saxlayan struktur ── */
const trails = {};        // mmsi → L.polyline
const trailHistory = {};  // mmsi → [[lat,lon], ...]
const TRAIL_LEN = 100;     // neçə nöqtə saxlanır

/* ── Axıcı interpolasiya üçün ── */
const markerTargets = {}; // mmsi → {lat, lon}
let animFrame = null;

function lerpMarkers() {
  let anyMoving = false;
  Object.keys(markerTargets).forEach(mmsi => {
    const m = markers[mmsi];
    if (!m) return;
    const target = markerTargets[mmsi];
    const cur = m.getLatLng();
    const dlat = target.lat - cur.lat;
    const dlon = target.lon - cur.lng;
    if (Math.abs(dlat) < 0.00001 && Math.abs(dlon) < 0.00001) return;
    anyMoving = true;
    // Easing: hər frame-də 22% qalan məsafəni keçir (60fps × 0.08 = çox sürətli)
    m.setLatLng([cur.lat + dlat * 0.08, cur.lng + dlon * 0.08]);
  });
  animFrame = requestAnimationFrame(lerpMarkers);
}

function updateMarkers() {
  Object.values(vessels).forEach(v => {
    if (!v.lat || !v.lon) return;

    if (markers[v.mmsi]) {
      // Hədəfi yenilə — lerp loop oraya doğru hərəkət edəcək
      markerTargets[v.mmsi] = { lat: v.lat, lon: v.lon };
      // İkonu yenilə (kurs dəyişirsə)
      markers[v.mmsi].setIcon(vesselIcon(v));
      markers[v.mmsi].setTooltipContent(
        `<b>${v.name||v.mmsi}</b><br>${(v.speed_knots||0).toFixed(1)} kt · ${(v.course_deg||0).toFixed(0)}° · ${v.status}`
      );

      // Trail (iz xətti) yenilə
      if (!trailHistory[v.mmsi]) trailHistory[v.mmsi] = [];
      trailHistory[v.mmsi].push([v.lat, v.lon]);
      if (trailHistory[v.mmsi].length > TRAIL_LEN)
        trailHistory[v.mmsi].shift();

      if (trails[v.mmsi]) {
        trails[v.mmsi].setLatLngs(trailHistory[v.mmsi]);
      } else {
        const col = v.status === 'active' ? '#00ff9d' :
                    v.status === 'dark'   ? '#ff4060' : '#ffaa00';
        trails[v.mmsi] = L.polyline(trailHistory[v.mmsi], {
          color: col, weight: 1.5, opacity: 0.45,
          dashArray: '4 4',
        }).addTo(vesselLayer);
      }

    } else {
      // Yeni marker yarat
      markers[v.mmsi] = L.marker([v.lat, v.lon], { icon: vesselIcon(v) })
        .addTo(vesselLayer)
        .bindTooltip(
          `<b>${v.name||v.mmsi}</b><br>${(v.speed_knots||0).toFixed(1)} kt · ${v.status}`,
          { direction: 'top', opacity: 0.9 }
        )
        .on('click', () => selectVessel(v.mmsi));

      markerTargets[v.mmsi] = { lat: v.lat, lon: v.lon };
      trailHistory[v.mmsi] = [[v.lat, v.lon]];
    }
  });

  // Lerp loop-u başlat (bir dəfə)
  if (!animFrame) lerpMarkers();

  updateKPIs();
}

/* ══════════════════ KPIs ══════════════════ */
function updateKPIs() {
  const list = Object.values(vessels);
  const active = list.filter(v => v.status === 'active');
  const totalCargo = list.reduce((s, v) => s + (v.cargo_tons||0), 0);
  const wagons = Math.ceil(totalCargo / 80);
  document.getElementById('kpi-vessels').textContent = active.length;
  document.getElementById('kpi-cargo').textContent = totalCargo.toFixed(0);
  document.getElementById('kpi-wagons').textContent = wagons;
  // anomaly count updated by loadAnomalies
}

/* ══════════════════ WEBSOCKET ══════════════════ */
let _listRenderTimer = null;
function scheduleListRender() {
  // Siyahını maksimum 2 dəfə/saniyə yenilə — DOM thrashing qarşısını alır
  if (_listRenderTimer) return;
  _listRenderTimer = setTimeout(() => { renderVesselList(); _listRenderTimer = null; }, 500);
}

function initWS() {
  const ws = new WebSocket(WS_URL);
  const statusEl = document.getElementById('ws-status');
  ws.onopen = () => { statusEl.textContent = 'WS AKTIV'; statusEl.style.color = 'var(--accent2)'; };
  ws.onclose = () => { statusEl.textContent = 'WS KƏSİLDİ'; statusEl.style.color = 'var(--danger)'; setTimeout(initWS, 3000); };
  ws.onerror = () => { statusEl.textContent = 'WS XƏTA'; statusEl.style.color = 'var(--danger)'; };
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'initial') {
      data.vessels.forEach(v => { vessels[v.mmsi] = { ...vessels[v.mmsi], ...v }; });
      renderVesselList(); updateMarkers();
    } else if (data.vessels) {
      data.vessels.forEach(v => {
        vessels[v.mmsi] = { ...vessels[v.mmsi], ...v };
      });
      // Marker-lar dərhal yenilənir (hərəkət görünsün)
      updateMarkers();
      // Siyahı isə debounce ilə (performans)
      scheduleListRender();
    }
  };
}

/* ══════════════════ TAB SWITCHING ══════════════════ */
function showTab(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`panel-${name}`).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => {
    if (b.textContent.trim().toLowerCase().includes(
      name==='vessel'?'gəmi':name==='reschedule'?'plan':name==='anomaly'?'anomaliya':name==='eta'?'eta':'peyk'
    )) b.classList.add('active');
  });
  if (name === 'reschedule') loadReschedule();
  if (name === 'anomaly')    loadAnomalies();
  if (name === 'eta')        loadETA();
  if (name === 'satellite')  loadSatellite();
}

/* ══════════════════ WEATHER BANNER HELPER ══════════════════ */
function weatherBannerHTML(w) {
  if (!w) return '';
  const icon = w.severity === 'KRİTİK' ? '🔴' : w.is_stormy ? '🟡' : '🟢';
  const cls = w.severity === 'KRİTİK' ? 'stormy' : w.is_stormy ? 'warn' : '';
  return `<div class="weather-banner ${cls}">
    <span class="wicon">${icon}</span>
    <div class="wtext">
      <strong>${w.status}</strong>
      <small>Külək: ${w.wind_speed_ms} m/s · Dalğa: ${w.wave_height_m} m · Görünüş: ${w.visibility_km} km</small>
    </div>
  </div>`;
}

/* ══════════════════ PANEL: DYNAMIC RESCHEDULING ══════════════════ */

  const tableEl = document.getElementById('reschedule-table');
  const sumEl   = document.getElementById('reschedule-summary');
  const bannerEl = document.getElementById('weather-banner');
  tableEl.innerHTML = '<div class="loading-row"><div class="spinner"></div> Hesablanır...</div>';
  try {
    const res = await fetch(`${API}/api/reschedule`);
    const d = await res.json();
    bannerEl.innerHTML = weatherBannerHTML(d.weather);
    sumEl.innerHTML = `
      <div class="sat-grid">
        <div class="sat-stat"><div class="big">${d.total_vessels}</div><div class="sub">Gəmi</div></div>
        <div class="sat-stat"><div class="big">${d.total_cargo_tons}</div><div class="sub">Ton</div></div>
        <div class="sat-stat"><div class="big">${d.total_wagons}</div><div class="sub">Vaqon</div></div>
        <div class="sat-stat"><div class="big">${d.buffer_hours.toFixed(1)}s</div><div class="sub">Buffer</div></div>
      </div>
      ${d.storm_buffer_applied ? '<div style="color:var(--danger);font-size:11px;padding:4px 0">⚠️ Fırtına buferi tətbiq olunub (+3 saat)</div>' : ''}`;

    if (!d.schedule.length) { tableEl.innerHTML = '<div style="color:var(--text-dim);padding:8px">Aktiv gəmi yoxdur</div>'; return; }

    tableEl.innerHTML = `
      <table class="sched-table">
        <thead><tr>
          <th>Gəmi</th><th>Ton</th><th>Vaqon</th><th>ETA (adj.)</th><th>Status</th>
        </tr></thead>
        <tbody>
          ${d.schedule.map(s => `<tr>
            <td><strong>${s.name||s.mmsi}</strong><br><span style="font-size:10px;color:var(--text-dim)">${s.mmsi}</span></td>
            <td>${s.cargo_tons}</td>
            <td>${s.wagons_needed} <span style="color:var(--text-dim);font-size:10px">(∑${s.wagons_cumulative})</span></td>
            <td style="font-family:var(--font-mono);font-size:10px">${s.eta_adjusted}</td>
            <td class="priority-${s.priority}">${s.priority}${s.anomaly?'<br><span style="font-size:9px;color:var(--danger)">⚠ Anomaliya</span>':''}</td>
          </tr>`).join('')}

  } catch(e) {
    tableEl.innerHTML = `<div style="color:var(--danger);font-size:11px;padding:4px">Xəta: ${e.message}</div>`;
  }
}

/* ══════════════════ PANEL: ANOMALY DETECTION ══════════════════ */
async function loadAnomalies() {
  const listEl = document.getElementById('anomaly-list');
  const sumEl  = document.getElementById('anomaly-summary');
  listEl.innerHTML = '<div class="loading-row"><div class="spinner"></div> Skan edilir...</div>';
  try {
    const res = await fetch(`${API}/api/anomalies`);
    const d = await res.json();
    document.getElementById('kpi-alerts').textContent = d.anomaly_count;

    sumEl.innerHTML = `
      ${weatherBannerHTML(d.weather)}
      <div style="display:flex;gap:8px;margin-top:8px">
        <div class="sat-stat" style="flex:1"><div class="big">${d.total_scanned}</div><div class="sub">Skan</div></div>
        <div class="sat-stat" style="flex:1"><div class="big" style="color:var(--danger)">${d.anomaly_count}</div><div class="sub">Anomaliya</div></div>
      </div>`;

    // Sort: HIGH first
    const sevOrder = {HIGH:3, MEDIUM:2, LOW:1, NONE:0};
    d.results.sort((a,b) => (sevOrder[b.severity]||0) - (sevOrder[a.severity]||0));

    listEl.innerHTML = '';
    d.results.forEach(r => {
      const icon = r.severity === 'HIGH' ? '🔴' :
                   r.severity === 'MEDIUM' ? '🟡' :
                   r.severity === 'LOW' ? '🔵' : '🟢';
      const div = document.createElement('div');
      div.className = `anom-item ${r.severity||'NONE'}`;
      div.innerHTML = `
        <span class="anom-icon">${icon}</span>
        <div class="anom-body">
          <strong>${r.name||r.mmsi}</strong>
          <span class="anom-badge ${r.severity||'NONE'}" style="float:right">${r.severity||'NONE'}</span>
          <p>${r.message}</p>
          ${r.action ? `<div class="action">→ ${r.action}</div>` : ''}
          ${r.count > 1 ? `<div style="font-size:10px;color:var(--text-dim);margin-top:4px">${r.count} anomaliya aşkarlandı</div>` : ''}
        </div>`;
      listEl.appendChild(div);
    });
  } catch(e) {
    listEl.innerHTML = `<div style="color:var(--danger);font-size:11px;padding:4px">Xəta: ${e.message}</div>`;
  }
}

/* ══════════════════ PANEL: ETA FORECAST ══════════════════ */
async function loadETA() {
  const listEl    = document.getElementById('eta-list');
  const weatherEl = document.getElementById('eta-weather');
  listEl.innerHTML = '<div class="loading-row"><div class="spinner"></div> Hesablanır...</div>';
  try {
    const res = await fetch(`${API}/api/eta/all`);
    const d = await res.json();
    weatherEl.innerHTML = weatherBannerHTML(d.weather);

    const maxH = Math.max(...d.eta_list.map(e => e.hours_remaining), 1);

    listEl.innerHTML = '';
    d.eta_list.forEach(e => {
      const pct = Math.max(5, Math.round((1 - e.hours_remaining / maxH) * 100));
      const barColor = e.hours_remaining < 5 ? 'var(--accent2)' :
                       e.hours_remaining < 12 ? 'var(--accent)' : 'var(--muted)';
      const div = document.createElement('div');
      div.className = 'eta-item';
      div.innerHTML = `
        <div class="eta-item-top">
          <span class="eta-name">${e.name||e.mmsi}</span>
          <span class="eta-time">${e.eta_display}</span>
        </div>
        <div class="eta-bar-wrap">
          <div class="eta-bar-fill" style="width:${pct}%;background:${barColor}"></div>
        </div>
        <div class="eta-meta">
          <span>${e.hours_remaining}s · ${e.distance_km}km</span>
          <span>${e.effective_speed_knots}kt · ${e.confidence_pct}</span>
        </div>`;
      listEl.appendChild(div);
    });
  } catch(e) {
    listEl.innerHTML = `<div style="color:var(--danger);font-size:11px;padding:4px">Xəta: ${e.message}</div>`;
  }
}

/* ══════════════════ INITIAL LOAD ══════════════════ */
async function bootstrap() {
  initMap();
  initWS();
  // Preload vessel list via REST as fallback
  try {
    const res = await fetch(`${API}/vessels`);
    const list = await res.json();
    list.forEach(v => { vessels[v.mmsi] = v; });
    renderVesselList(); updateMarkers();
  } catch(e) { console.warn('REST vessels fetch failed:', e); }
}

document.addEventListener('DOMContentLoaded', bootstrap);

// Auto-refresh panels every 30s
setInterval(() => {
  const active = document.querySelector('.panel.active');
  if (!active) return;
  const id = active.id;
  if (id === 'panel-reschedule') loadReschedule();
  if (id === 'panel-anomaly')    loadAnomalies();
  if (id === 'panel-eta')        loadETA();
  if (id === 'panel-satellite')  loadSatellite();
}, 30000);
</script>
